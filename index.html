<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jim's Trip Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: #f0f0f0; color: #333; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* HEADER */
    #header { background: #1a1f2e; border-bottom: 2px solid #e8a020; padding: 0 16px; height: 48px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 200; }
    #header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 1px; color: #e8a020; text-transform: uppercase; }
    .subtitle { font-size: 12px; color: #8896aa; letter-spacing: 2px; text-transform: uppercase; }
    .spacer { flex: 1; }

    /* MAIN */
    #main { display: flex; flex: 1; overflow: hidden; position: relative; }
    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* SPLASH */

    /* LOADING OVERLAY */
    #config-loading { position: absolute; inset: 0; background: rgba(255,255,255,0.85); display: none; align-items: center; justify-content: center; z-index: 600; flex-direction: column; gap: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; color: #555; }
    #config-loading .big-spin { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #e8a020; border-radius: 50%; animation: spin 0.7s linear infinite; }
    #config-loading.show { display: flex; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FLOATING LAYERS WIDGET */
    #layers-widget { position: absolute; top: 12px; left: 12px; z-index: 400; width: 260px; }
    #layers-toggle-btn { background: white; border: none; border-radius: 8px; padding: 8px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.25); width: 100%; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #333; transition: box-shadow 0.2s; }
    #layers-toggle-btn:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.3); }
    #layers-toggle-btn .btn-icon { font-size: 16px; }
    #layers-toggle-btn .btn-label { flex: 1; text-align: left; }
    #layers-toggle-btn .btn-arrow { font-size: 10px; color: #888; transition: transform 0.2s; }
    #layers-toggle-btn.open .btn-arrow { transform: rotate(180deg); }
    #layers-dropdown { background: white; border-radius: 8px; margin-top: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); overflow: hidden; display: none; max-height: calc(100vh - 140px); flex-direction: column; }
    #layers-dropdown.open { display: flex; }
    #layers-header { background: #f8f8f8; border-bottom: 1px solid #e8e8e8; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    #layers-header span { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #888; }
    #toggle-all { font-size: 10px; background: none; border: 1px solid #ddd; color: #666; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase; }
    #toggle-all:hover { border-color: #e8a020; color: #e8a020; }
    #layers-list { overflow-y: auto; flex: 1; padding: 6px 0; }
    #layers-list::-webkit-scrollbar { width: 4px; }
    #layers-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
    #layers-status { padding: 6px 12px; font-size: 11px; color: #888; border-top: 1px solid #eee; flex-shrink: 0; min-height: 26px; }
    .group-hdr { display: flex; align-items: center; gap: 8px; padding: 6px 12px 4px; cursor: pointer; user-select: none; background: #efefef; border-top: 1px solid #e0e0e0; margin-top: 2px; }
    .group-hdr:hover { background: #e5e5e5; }
    .chevron { font-size: 9px; color: #aaa; transition: transform 0.2s; width: 10px; }
    .chevron.closed { transform: rotate(-90deg); }
    .group-cb { width: 13px; height: 13px; cursor: pointer; accent-color: #e8a020; }
    .group-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #555; flex: 1; }
    .group-kids.hidden { display: none; }
    .layer-row { display: flex; align-items: center; gap: 8px; padding: 4px 12px 4px 28px; cursor: pointer; transition: background 0.15s; }
    .layer-row.ungrouped { padding-left: 12px; }
    .layer-row:hover { background: #f5f5f5; }
    .layer-cb { width: 13px; height: 13px; cursor: pointer; flex-shrink: 0; accent-color: #e8a020; }
    .layer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.1); }
    .layer-lbl { font-size: 13px; color: #333; flex: 1; }
    .layer-cnt { font-size: 10px; color: #aaa; min-width: 20px; text-align: right; }

    /* SEARCH BTN */
    #search-btn { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 400; background: white; border: none; border-radius: 20px; padding: 8px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.25); font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: #333; cursor: pointer; display: none; align-items: center; gap: 6px; transition: box-shadow 0.2s; white-space: nowrap; }
    #search-btn:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.3); }
    #search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #search-btn.visible { display: flex; }
    .spin { width: 12px; height: 12px; border: 2px solid #ddd; border-top-color: #3d9be9; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    #search-btn.searching .spin { display: inline-block; }

    /* TOOLTIP */
    #tooltip { position: absolute; background: #1a1f2e; border: 1px solid #2d3548; border-radius: 8px; padding: 8px 12px; pointer-events: all; z-index: 500; max-width: 260px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); display: none; }
    .tt-name { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; color: #e2e8f0; margin-bottom: 2px; }
    .tt-meta { font-size: 11px; color: #8896aa; line-height: 1.6; }
    .tt-link { font-size: 11px; color: #3d9be9; text-decoration: none; display: block; margin-top: 4px; }
    .tt-link:hover { text-decoration: underline; }

    /* POPUP */
    /* InfoWindow custom styles — injected into the Google Maps InfoWindow container.
       The InfoWindow itself provides the bubble + pointer/tail + close button. */
    .iw-wrap { width: 280px; font-family: 'Barlow', sans-serif; }
    .iw-photo { width: 100%; height: auto; max-height: 300px; object-fit: contain; display: none; border-radius: 4px; margin-bottom: 8px; background: #f8f8f8; }
    .iw-placeholder { width: 100%; height: 60px; background: #f0f0f0; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 24px; margin-bottom: 8px; }
    .iw-tag { display: inline-block; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; margin-bottom: 6px; color: white; }
    .iw-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: #222; margin-bottom: 4px; line-height: 1.2; }
    .iw-rating { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .iw-stars { color: #e8a020; font-size: 13px; }
    .iw-rnum { font-size: 13px; font-weight: 500; color: #333; }
    .iw-rcnt { font-size: 12px; color: #888; }
    .iw-divider { border: none; border-top: 1px solid #eee; margin: 8px 0; }
    .iw-field { display: flex; gap: 8px; margin-bottom: 5px; align-items: flex-start; }
    .iw-icon { width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; margin-top: 1px; color: #888; }
    .iw-text { font-size: 12px; color: #333; line-height: 1.4; flex: 1; }
    .iw-text a { color: #3d9be9; text-decoration: none; }
    .iw-text a:hover { text-decoration: underline; }
    .iw-gmaps { display: block; text-align: center; background: #3d9be9; color: white; text-decoration: none; padding: 7px; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; }
    .iw-gmaps:hover { opacity: 0.85; }
    /* Suppress the default InfoWindow padding so our content fills edge-to-edge */
    .gm-style .gm-style-iw-c { padding: 0 !important; border-radius: 8px !important; }
    .gm-style .gm-style-iw-d { overflow: auto !important; max-height: 520px !important; padding: 12px !important; box-sizing: border-box; }
    /* Remove the extra top padding Google adds above the close button */
    .gm-style .gm-style-iw-t::after { display: none; }
    .gm-style-iw-chr { position: absolute; top: 4px; right: 4px; z-index: 10; }
    .gm-style-iw-chr button { background: rgba(0,0,0,0.1) !important; border-radius: 50% !important; }

    /* ROUTE */
    /* Clear Route button — only visible when a GPX route is active */
    #clear-route-btn { position: absolute; bottom: 24px; left: 12px; background: #e8a020; color: white; border: none; border-radius: 20px; padding: 6px 16px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; z-index: 400; box-shadow: 0 2px 8px rgba(0,0,0,0.25); display: none; }
    #clear-route-btn:hover { opacity: 0.85; }
    /* GPX loader row inside the Layers panel */
    #gpx-layer-row { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-top: 1px solid #eee; cursor: pointer; }
    #gpx-layer-row:hover { background: #f5f5f5; }
    #gpx-layer-icon { font-size: 14px; }
    #gpx-layer-lbl { font-size: 13px; color: #333; flex: 1; }
    #gpx-layer-cnt { font-size: 10px; color: #aaa; }
    #gpx-file { display: none; }
  </style>
</head>
<body>

<div id="header">
  <h1>🗺 Trip Planner</h1>
  <span class="subtitle" id="mode-subtitle">Jim's Adventure Map</span>
  <script>
    // Inline so it runs before the rest of the page paints —
    // avoids a flicker where the subtitle briefly shows the wrong text
    if (new URLSearchParams(window.location.search).get('private') === 'true') {
      document.getElementById('mode-subtitle').textContent = 'Private Mode';
      document.getElementById('mode-subtitle').style.color = '#e8a020';
    }
  </script>
  <div class="spacer"></div>
</div>

<div id="main">
  <div id="map-wrap">

    <div id="map"></div>
    <div id="config-loading"><div class="big-spin"></div><span id="loading-msg">Loading layer config…</span></div>

    <div id="layers-widget">
      <button id="layers-toggle-btn" onclick="toggleLayersPanel()">
        <span class="btn-icon">🗂</span>
        <span class="btn-label">Layers</span>
        <span class="btn-arrow">▼</span>
      </button>
      <div id="layers-dropdown">
        <div id="layers-header"><span>Map Layers</span><button id="toggle-all">All On</button></div>
        <div id="layers-list"></div>
        <div id="layers-status">Load map to begin.</div>
      </div>
    </div>

    <button id="search-btn" disabled><span class="spin"></span>🔍 Search This Area</button>

    <div id="tooltip">
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-meta" id="tt-meta"></div>
      <a class="tt-link" id="tt-link" href="#" target="_blank">↗ Open in Google Maps</a>
    </div>

    <!-- Popup content is now rendered inside a Google Maps InfoWindow,
         which anchors to the marker with a pointer tail (like Google My Maps).
         No static HTML needed here — the InfoWindow is built dynamically in JS. -->

    <!-- Floating Clear Route button — only visible when a GPX route is active -->
    <button id="clear-route-btn" onclick="clearAllRoutes()">✕ Clear Route</button>
    <!-- Hidden file input triggered by the GPX row in the Layers panel -->
    <input type="file" id="gpx-file" accept=".gpx"/>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURATION
// These constants are the only things you should need to
// change when setting up the app for a new deployment.
// ═══════════════════════════════════════════════════════════

// Google Maps API key — restricted to this domain in Cloud Console.
// Because it is domain-restricted, embedding it here is safe:
// someone who copies the key can only use it from this same URL.
const API_KEY = 'AIzaSyBuzcElvnGmLUbRa3LKDhEliiEHkGFYc_s';

// Private mode: Sheet layers (personal data) are only loaded when
// the URL contains ?private=true  e.g. https://jumpin721-ux.github.io?private=true
// The default public URL shows Places API layers only.
const IS_PRIVATE = new URLSearchParams(window.location.search).get('private') === 'true';

// Google Sheet that holds the layer configuration
// (which layers exist, what type, what color, which data tab, etc.)
const LAYERS_SHEET_ID = '15rXYK5K1PCI-iN50fPHjCX8RkYB0Ka90phN55ikGZEU';
const LAYERS_TAB      = 'Sheet1';

// Google Drive folder IDs for photos and GPX route files
const IMAGES_FOLDER_ID = '1roG8susT1hQp8DDXZW28rXVHoyarhCt3';
const ROUTES_FOLDER_ID = '1a9YjGtJgk2NLwE-Hzy367cNViuZ5ciL7';

// Column indices (0-based) in the layer config sheet.
// These map each sheet column to a named property.
const COL = {
  LAYER:0, TYPE:1, GROUP:2, SEARCH_FOR:3, API_TYPE:4,
  COLOR:5, ICON:6, SHEET_ID:7, TAB:8,
  HOVER_START:9,   // columns 9-13  → up to 5 hover fields
  CLICK_START:14   // columns 14-24 → up to 11 click/popup fields
};

// ═══════════════════════════════════════════════════════════
// APPLICATION STATE
// All mutable state lives here so it is easy to find.
// ═══════════════════════════════════════════════════════════

let map;                  // The google.maps.Map instance
let apiKey = API_KEY;     // Kept as a variable so future code can override it
let markers  = {};        // layerId → [{marker, place|record}]
let enabled  = {};        // layerId → boolean (is this layer visible?)
let seen     = new Set(); // Place IDs already plotted (prevents duplicates)
let routeRenderer = null; // Reserved — DirectionsRenderer removed with Route Planner

let layersPanelOpen = false;
let LAYERS = [];          // Array of layer config objects built from the sheet
let sheetLoaded = {};     // layerId → boolean (has this sheet layer been fetched yet?)
let imageCache = {};      // filename → Drive file ID  (avoids repeat Drive API calls)
let routeCache = {};      // filename → Drive file ID  (for GPX files on Drive)
let autoPolylines = {};   // layerId → [google.maps.Polyline] for GPX-Auto routes
let clickPolyline  = null; // Single polyline shown when user clicks a Bike Rides marker
let fileGPXLine    = null; // Polyline loaded from a user-uploaded GPX file — persists until Route Planner reopens
let infoWindow     = null; // Google Maps InfoWindow — the anchored popup with pointer tail
var _hideTimer = null;    // setTimeout handle used to delay tooltip hide

// ═══════════════════════════════════════════════════════════
// BOOT — wire up button/event listeners before the map loads
// ═══════════════════════════════════════════════════════════

// Auto-load Google Maps as soon as the page is ready — no button needed.
// The API key is embedded, so there's nothing for the user to provide first.
(function() {
  var s = document.createElement('script');
  // 'libraries=routes' loads the modern Routes library (needed by DirectionsService)
  // 'callback=initMap' tells Google Maps to call our initMap() when ready
  // 'loading=async' prevents the script from blocking page render
  s.src = 'https://maps.googleapis.com/maps/api/js?key='+apiKey+'&libraries=routes&callback=initMap&loading=async';
  s.async = true;
  s.onerror = function(){ console.error('Failed to load Google Maps API.'); };
  document.head.appendChild(s);
})();

// Wire up the rest of the UI controls
document.getElementById('search-btn').addEventListener('click',  searchArea);
document.getElementById('toggle-all').addEventListener('click',  toggleAll);
document.getElementById('gpx-file').addEventListener('change', loadGPXFile);
// InfoWindow has its own built-in close button — no separate listener needed

// ═══════════════════════════════════════════════════════════
// INIT MAP — called by Google Maps JS once it has loaded
// ═══════════════════════════════════════════════════════════

window.initMap = async function() {
  // Restore the last map position from localStorage, or default to Dayton OH
  var saved = getSaved();

  map = new google.maps.Map(document.getElementById('map'), {
    center:   saved.center,
    zoom:     saved.zoom,
    mapTypeId: 'roadmap',
    // Hide controls we don't need
    streetViewControl:  false,
    fullscreenControl:  false,
    gestureHandling:    'greedy',  // single-finger pan on mobile
    // Keep map type (road/satellite) and zoom in sensible positions
    mapTypeControl:     true,
    mapTypeControlOptions: { position: google.maps.ControlPosition.TOP_RIGHT },
    zoomControl:        true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
    styles: mapStyles()   // suppress default POI clutter
  });

  // Save position whenever the map comes to rest after a pan/zoom
  map.addListener('idle', savePos);

  // InfoWindow closes itself when the user clicks the map background or its X button

  // Keep tooltip alive while the mouse is over it,
  // but hide it shortly after the mouse leaves
  document.getElementById('tooltip').addEventListener('mouseenter', function(){ clearTimeout(_hideTimer); });
  document.getElementById('tooltip').addEventListener('mouseleave', scheduleHide);

  // Route Planner removed — GPX file loading is now in the Layers panel

  // Fetch the layer configuration from Google Sheets and build the panel
  showLoadingMsg('Loading layer config…');
  try {
    await loadLayerConfig();
  } catch(e) {
    console.error('Config load error:', e);
    setStatus('Error loading config: ' + e.message);
  }
  hideLoading();

  buildPanel();
  document.getElementById('search-btn').disabled = false;
  document.getElementById('search-btn').classList.add('visible');
  setStatus('Map loaded. Click Search This Area to begin.');
};

// Helper: show the full-screen loading overlay with a custom message
function showLoadingMsg(msg) {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('config-loading').classList.add('show');
}
// Helper: hide the loading overlay
function hideLoading() {
  document.getElementById('config-loading').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════
// LOAD LAYER CONFIG FROM GOOGLE SHEETS
// Reads the config sheet and builds the LAYERS array.
// Each layer is either:
//   type:'group'  — a collapsible header in the panel
//   type:'places' — queries the Google Places API nearby
//   type:'sheet'  — reads a separate Google Sheet for pin data
// ═══════════════════════════════════════════════════════════

async function loadLayerConfig() {
  var url = 'https://sheets.googleapis.com/v4/spreadsheets/'
          + LAYERS_SHEET_ID + '/values/'
          + encodeURIComponent(LAYERS_TAB)
          + '?key=' + apiKey;

  var resp = await fetch(url);
  if (!resp.ok) throw new Error('Could not read config sheet (' + resp.status + ')');
  var data = await resp.json();
  var rows = data.values || [];

  LAYERS = [];
  var currentGroup = null; // tracks the most recent Group row so children can attach to it

  // Start at row 1 to skip the header row
  for (var i = 1; i < rows.length; i++) {
    var row = rows[i];
    if (!row || !row[COL.LAYER]) continue;        // skip blank rows
    var layerName = (row[COL.LAYER] || '').trim();
    var layerType = (row[COL.TYPE]  || '').trim();
    if (!layerType) continue;                      // blank type = layer disabled

    var groupName = (row[COL.GROUP]    || '').trim().replace(/^-$/, '');
    var apiType   = (row[COL.API_TYPE] || '').trim();
    var colorRaw  = (row[COL.COLOR]    || '').trim();
    var sheetId   = (row[COL.SHEET_ID] || '').trim();
    var tabName   = (row[COL.TAB]      || '').trim().replace(/^-$/, '');
    var color     = parseColor(colorRaw);

    // Collect up to 5 hover fields and up to 11 click/popup fields,
    // skipping any cell that is empty or contains just a dash placeholder
    var hover = [], click = [];
    for (var h = 0; h < 5;  h++) { var v  = (row[COL.HOVER_START + h] || '').trim(); if (v && v !== '-') hover.push(v); }
    for (var c = 0; c < 11; c++) { var v2 = (row[COL.CLICK_START + c] || '').trim(); if (v2 && v2 !== '-') click.push(v2); }

    if (layerType === 'Group') {
      // Group rows create a collapsible section header in the layer panel
      currentGroup = { id: slugify(layerName), type: 'group', label: layerName, children: [] };
      LAYERS.push(currentGroup);

    } else if (layerType === 'Places API') {
      // Places API layers search Google Places by type (e.g. 'campground', 'restaurant')
      var layer = { id: slugify(layerName), type: 'places', label: layerName, color: color, searchType: apiType, hover: hover, click: click };
      if (groupName && currentGroup && currentGroup.label === groupName) currentGroup.children.push(layer);
      else LAYERS.push(layer);

    } else if (layerType === 'Google Sheet') {
      // Sheet layers contain personal data (People, Travel, etc.).
      // In public mode (default), these are skipped entirely so visitors
      // only see the Places API layers. Pass ?private=true to enable them.
      if (!IS_PRIVATE) continue;
      var slayer = { id: slugify(layerName), type: 'sheet', label: layerName, color: color, sheetId: sheetId, tabName: tabName, hover: hover, click: click };
      if (groupName && currentGroup && currentGroup.label === groupName) currentGroup.children.push(slayer);
      else LAYERS.push(slayer);
    }
  }
}

// ── Color and ID helpers ───────────────────────────────────

// Accept either a hex color '#rrggbb' or a friendly name like 'orange'
function parseColor(raw) {
  if (!raw) return '#999999';
  var hex = raw.match(/#[0-9a-fA-F]{6}/);
  if (hex) return hex[0];
  var names = { 'red':'#e05252','orange':'#e8841a','dkblue':'#2e6fbf','medblue':'#4a90c4','ltblue':'#7ab4d8','green':'#3daa5c','pink':'#d47fa6','brown':'#8B5E3C','purple':'#7B4FBF','blue':'#3d9be9' };
  return names[raw.toLowerCase().replace(/\s+/g, '')] || '#999999';
}

// Convert a human-readable name to a safe DOM/object key, e.g. "Bike Rides" → "bike-rides"
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

// ═══════════════════════════════════════════════════════════
// MAP POSITION PERSISTENCE
// Saves/restores the last map center and zoom in localStorage
// so the user picks up where they left off on reload.
// ═══════════════════════════════════════════════════════════

function savePos() {
  if (!map) return;
  var c = map.getCenter();
  try { localStorage.setItem('tp_pos', JSON.stringify({ lat: c.lat(), lng: c.lng(), zoom: map.getZoom() })); } catch(e) {}
}

function getSaved() {
  try {
    var p = JSON.parse(localStorage.getItem('tp_pos'));
    if (p && p.lat) return { center: { lat: p.lat, lng: p.lng }, zoom: p.zoom || 10 };
  } catch(e) {}
  return { center: { lat: 39.7589, lng: -84.1916 }, zoom: 10 }; // default: Dayton OH
}

// ═══════════════════════════════════════════════════════════
// LAYER PANEL — builds the checkbox list in the Layers widget
// ═══════════════════════════════════════════════════════════

function toggleLayersPanel() {
  layersPanelOpen = !layersPanelOpen;
  document.getElementById('layers-toggle-btn').classList.toggle('open', layersPanelOpen);
  document.getElementById('layers-dropdown').classList.toggle('open', layersPanelOpen);
}

// Flatten the LAYERS tree to get just the leaf (non-group) layers
function getAllLeaf() {
  var r = [];
  LAYERS.forEach(function(l) {
    if (l.type === 'group') l.children.forEach(function(c) { r.push(c); });
    else r.push(l);
  });
  return r;
}

// Builds the full panel DOM from the LAYERS array
function buildPanel() {
  var list = document.getElementById('layers-list');
  list.innerHTML = '';
  LAYERS.forEach(function(item) {
    if (item.type === 'group') {
      // Create a collapsible group header with a master checkbox
      var wrap = document.createElement('div');
      var hdr  = document.createElement('div'); hdr.className = 'group-hdr';
      var chev = document.createElement('span'); chev.className = 'chevron'; chev.textContent = '▾';
      var gcb  = document.createElement('input'); gcb.type = 'checkbox'; gcb.className = 'group-cb'; gcb.checked = false;
      var lbl  = document.createElement('span'); lbl.className = 'group-lbl'; lbl.textContent = item.label;
      hdr.appendChild(chev); hdr.appendChild(gcb); hdr.appendChild(lbl);
      var kids = document.createElement('div'); kids.className = 'group-kids';

      // Clicking anywhere on the header (except the checkbox) toggles collapse
      hdr.addEventListener('click', function(e) {
        if (e.target === gcb) return; // let checkbox handle its own click
        kids.classList.toggle('hidden');
        chev.classList.toggle('closed');
      });

      // The group checkbox shows/hides all children at once
      gcb.addEventListener('change', function() {
        item.children.forEach(function(child) {
          enabled[child.id] = gcb.checked;
          var cb = document.querySelector('[data-id="' + child.id + '"] .layer-cb');
          if (cb) cb.checked = gcb.checked;
          setVisible(child.id, gcb.checked);
          // Also toggle any auto-rendered GPX polylines for this child
          if (autoPolylines[child.id]) {
            autoPolylines[child.id].forEach(function(p) { p.setVisible(gcb.checked); });
          }
        });
      });

      item.children.forEach(function(child) { kids.appendChild(makeLayerRow(child, true)); });
      wrap.appendChild(hdr); wrap.appendChild(kids); list.appendChild(wrap);
    } else {
      list.appendChild(makeLayerRow(item, false));
    }
  });

  // Add the GPX file loader row at the bottom of the panel
  addGpxLayerRow();
}

// Creates a single layer row (checkbox + color dot + label + count badge)
function makeLayerRow(layer, isChild) {
  // Layers start OFF by default — the user enables what they want,
  // then clicks Search This Area to load results.
  enabled[layer.id] = false;
  markers[layer.id] = [];

  var row = document.createElement('div');
  row.className  = 'layer-row' + (isChild ? '' : ' ungrouped');
  row.dataset.id = layer.id;

  var cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'layer-cb'; cb.checked = false;
  cb.addEventListener('change', function() {
    toggleLayer(layer.id, cb.checked);
    // If the user re-enables a sheet layer that was never loaded, load it now
    if (cb.checked && layer.type === 'sheet' && !sheetLoaded[layer.id]) {
      loadSheetLayer(layer);
    }
    // Show/hide the GPX polylines drawn for this layer
    if (autoPolylines[layer.id]) {
      autoPolylines[layer.id].forEach(function(p) { p.setVisible(cb.checked); });
    }
  });

  var dot = document.createElement('div'); dot.className = 'layer-dot'; dot.style.background = layer.color;
  var lbl = document.createElement('span'); lbl.className = 'layer-lbl'; lbl.textContent = layer.label;
  var cnt = document.createElement('span'); cnt.className = 'layer-cnt'; cnt.id = 'cnt-' + layer.id;

  row.appendChild(cb); row.appendChild(dot); row.appendChild(lbl); row.appendChild(cnt);
  return row;
}

// Add the GPX file loader as a pseudo-layer row at the bottom of the Layers panel.
// Clicking it opens the file picker; the loaded route persists until Clear Route is used.
function addGpxLayerRow() {
  var list = document.getElementById('layers-list');
  var row  = document.createElement('div');
  row.id   = 'gpx-layer-row';

  var icon = document.createElement('span'); icon.id = 'gpx-layer-icon'; icon.textContent = '📂';
  var lbl  = document.createElement('span'); lbl.id  = 'gpx-layer-lbl';  lbl.textContent  = 'Load GPX File';
  var cnt  = document.createElement('span'); cnt.id  = 'gpx-layer-cnt';  // shows filename after load

  // Clicking the row triggers the hidden file input
  row.addEventListener('click', function() {
    document.getElementById('gpx-file').click();
  });

  row.appendChild(icon); row.appendChild(lbl); row.appendChild(cnt);
  list.appendChild(row);
}

// Show or hide all markers for a given layer
function toggleLayer(id, on)  { enabled[id] = on; setVisible(id, on); }
function setVisible(id, on)   { (markers[id] || []).forEach(function(m) { m.marker.setVisible(on); }); }

// Toggle all layers on or off at once (the "All Off / All On" button)
function toggleAll() {
  var btn   = document.getElementById('toggle-all');
  var allOn = btn.textContent === 'All On';
  btn.textContent = allOn ? 'All Off' : 'All On';

  getAllLeaf().forEach(function(l) {
    enabled[l.id] = allOn;
    setVisible(l.id, !allOn);
    var cb = document.querySelector('[data-id="' + l.id + '"] .layer-cb');
    if (cb) cb.checked = allOn;
    if (autoPolylines[l.id]) autoPolylines[l.id].forEach(function(p) { p.setVisible(allOn); });
  });
  // Also sync the group-level checkboxes
  document.querySelectorAll('.group-cb').forEach(function(gcb) { gcb.checked = allOn; });
}

// ═══════════════════════════════════════════════════════════
// SEARCH THIS AREA
// Fires off searches for all active Places API layers within
// the current map viewport, and loads any unloaded Sheet layers.
// ═══════════════════════════════════════════════════════════

function searchArea() {
  if (!map) return;
  var btn = document.getElementById('search-btn');
  btn.classList.add('searching'); btn.disabled = true;
  setStatus('Searching…');

  // Clear existing Places markers so re-searching a new area starts fresh
  getAllLeaf().forEach(function(l) {
    if (l.type !== 'places') return;
    (markers[l.id] || []).forEach(function(m) { m.marker.setMap(null); });
    markers[l.id] = [];
    var el = document.getElementById('cnt-' + l.id); if (el) el.textContent = '';
  });
  seen.clear();

  var bounds = map.getBounds(), center = map.getCenter();
  var radius = Math.min(calcRadius(bounds), 50000); // cap at 50 km

  // Gather active Places layers and Sheet layers that haven't loaded yet
  var activePlaces = getAllLeaf().filter(function(l) { return enabled[l.id] && l.type === 'places' && l.searchType; });
  var activeSheets = getAllLeaf().filter(function(l) { return enabled[l.id] && l.type === 'sheet' && l.sheetId && !sheetLoaded[l.id]; });

  var promises = [];
  activePlaces.forEach(function(l) { promises.push(searchLayer(l, center, radius)); });
  activeSheets.forEach(function(l) { promises.push(loadSheetLayer(l)); });

  if (!promises.length) {
    setStatus('No active layers to search.');
    btn.classList.remove('searching'); btn.disabled = false;
    return;
  }

  // Wait for all searches to complete before updating the status bar
  Promise.allSettled(promises).then(function(results) {
    var total = 0;
    results.forEach(function(r) { if (r.status === 'fulfilled' && r.value) total += r.value; });
    setStatus('Found ' + total + ' results across ' + (activePlaces.length + activeSheets.length) + ' active layers.');
    btn.classList.remove('searching'); btn.disabled = false;
  });
}

// Calculate the radius of the current map viewport in metres (used for Places API)
function calcRadius(bounds) {
  if (!bounds) return 10000;
  var ne = bounds.getNorthEast(), sw = bounds.getSouthWest(), R = 6371000;
  var lat1 = ne.lat() * Math.PI / 180, lat2 = sw.lat() * Math.PI / 180;
  var dLat = lat2 - lat1, dLng = (sw.lng() - ne.lng()) * Math.PI / 180;
  var a = Math.sin(dLat/2)**2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) / 2;
}

// ═══════════════════════════════════════════════════════════
// PLACES API SEARCH
// Calls the Google Places API (New) searchNearby endpoint for
// one layer. Handles pagination via nextPageToken automatically.
// ═══════════════════════════════════════════════════════════

function searchLayer(layer, center, radius) {
  var fieldMask = buildMask(layer); // only request fields we actually display
  var body = {
    includedTypes:       [layer.searchType],
    maxResultCount:      20,
    locationRestriction: { circle: { center: { latitude: center.lat(), longitude: center.lng() }, radius: radius } }
  };

  // Recursive inner function handles pagination (nextPageToken)
  function fetchPage(pageToken) {
    var req = Object.assign({}, body);
    if (pageToken) req.pageToken = pageToken;
    return fetch('https://places.googleapis.com/v1/places:searchNearby', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': apiKey, 'X-Goog-FieldMask': fieldMask },
      body:    JSON.stringify(req)
    }).then(function(resp) {
      if (!resp.ok) return 0;
      return resp.json().then(function(data) {
        var places = data.places || [], count = 0;
        places.forEach(function(p) {
          var pid = p.id || p.name;
          if (seen.has(pid)) return;    // skip duplicates across layers
          seen.add(pid);
          var lat = p.location && p.location.latitude;
          var lng = p.location && p.location.longitude;
          if (!lat || !lng) return;
          markers[layer.id].push({ marker: makeMarker(p, layer, lat, lng), place: p });
          count++;
        });
        var el = document.getElementById('cnt-' + layer.id);
        if (el) el.textContent = (parseInt(el.textContent || 0) + count) || '';
        // If there are more results, fetch the next page
        if (data.nextPageToken) return fetchPage(data.nextPageToken).then(function(more) { return count + more; });
        return count;
      });
    }).catch(function(e) { console.error(e); return 0; });
  }
  return fetchPage(null);
}

// Build the Places API field mask — only request what each layer needs,
// since unused fields add cost.
function buildMask(layer) {
  var base   = ['id', 'displayName', 'location', 'primaryTypeDisplayName'];
  var extras = new Set();
  (layer.hover || []).concat(layer.click || []).forEach(function(f) {
    var n = f.toLowerCase().replace(/\s+/g, '');
    if      (n === 'name')                               extras.add('displayName');
    else if (n === 'photo')                              extras.add('photos');
    else if (n === 'rating')                             extras.add('rating');
    else if (n === 'userratingcount' || n === 'reviewcount') extras.add('userRatingCount');
    else if (n === 'formattedaddress' || n === 'address')   extras.add('formattedAddress');
    else if (n === 'websiteuri' || n === 'website')      extras.add('websiteUri');
    else if (n === 'nationalPhonenumber' || n === 'phone')  extras.add('nationalPhoneNumber');
    else if (n === 'regularopeninghours' || n === 'hours')  extras.add('regularOpeningHours');
    else if (n === 'editorialsummary' || n === 'description') extras.add('editorialSummary');
    else if (n === 'pricelevel' || n === 'dollarrange')  extras.add('priceLevel');
    else if (n === 'primarytypedisplayname' || n === 'cuisine' || n === 'category') extras.add('primaryTypeDisplayName');
  });
  return Array.from(new Set(base.concat(Array.from(extras))))
              .map(function(f) { return 'places.' + f; })
              .join(',');
}

// ═══════════════════════════════════════════════════════════
// SHEET LAYER LOADING
// Reads a Google Sheet tab to plot markers from stored lat/lng.
// Also handles:
//   - Photo lookup in Google Drive
//   - GPX-Auto: auto-renders a route polyline for each row
//   - GPX (click): renders a route when the marker is clicked
//
// Multi-part routes work like this: a row with a GPX filename
// but NO lat/lng skips pin creation and just draws the route.
// This lets Northern Tier be split across multiple rows/files.
// ═══════════════════════════════════════════════════════════

async function loadSheetLayer(layer) {
  if (!layer.sheetId || !layer.tabName) return 0;
  try {
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/'
            + layer.sheetId + '/values/'
            + encodeURIComponent(layer.tabName)
            + '?key=' + apiKey;
    var resp = await fetch(url);
    if (!resp.ok) { console.error('Sheet error ' + layer.label + ': ' + resp.status); return 0; }
    var data = await resp.json();
    var rows = data.values || [];
    if (rows.length < 2) return 0;

    // Build a header-name → column-index map (case-insensitive)
    var headers = {};
    rows[0].forEach(function(h, i) { headers[h.trim().toLowerCase()] = i; });

    // Accept both full names ('Latitude'/'Longitude') and short names ('Lat'/'Long')
    var latCol = headers['latitude'] !== undefined ? headers['latitude'] : headers['lat'];
    var lngCol = headers['longitude'] !== undefined ? headers['longitude'] : headers['long'];
    if (latCol === undefined || lngCol === undefined) {
      console.error('Missing Latitude/Longitude columns in ' + layer.label); return 0;
    }
    var photoCol    = headers['photo'];
    var gpxAutoCol  = headers['gpx-auto'];   // auto-render route on load
    var gpxClickCol = headers['gpx'];         // render route when marker is clicked
    var gpxColorCol = headers['gpx color'] !== undefined ? headers['gpx color']
                    : headers['route-color'] !== undefined ? headers['route-color'] : undefined;

    // Initialise the polyline storage for this layer if it uses GPX-Auto
    if (gpxAutoCol !== undefined) autoPolylines[layer.id] = [];

    var count    = 0;
    var promises = [];

    for (var i = 1; i < rows.length; i++) {
      var row = rows[i];

      // ── Read GPX filename and color for THIS row BEFORE the no-pin check ──
      // BUG FIX: previously these were read AFTER the continue statement, so
      // continuation rows (no lat/lng) used stale values from the previous row.
      var gpxFilename = '';
      var gpxColor    = '#e8a020';
      if (gpxAutoCol  !== undefined) gpxFilename = (row[gpxAutoCol]  || '').trim();
      else if (gpxClickCol !== undefined) gpxFilename = (row[gpxClickCol] || '').trim();
      if (gpxColorCol !== undefined) gpxColor = parseColor((row[gpxColorCol] || '').trim()) || '#e8a020';

      var lat    = parseFloat(row[latCol]);
      var lng    = parseFloat(row[lngCol]);
      var hasPin = !isNaN(lat) && !isNaN(lng);

      // ── Continuation / no-pin row ──
      // Rows with GPX data but no lat/lng just draw route segments — no marker.
      // The cell value may contain multiple pipe-separated segments, each with
      // their own optional color: "day1.gpx #e05252 | day2.gpx #3daa5c"
      if (!hasPin) {
        if (gpxAutoCol !== undefined && gpxFilename) {
          var segs = parseGpxSegments(gpxFilename, gpxColor);
          segs.forEach(function(seg) {
            promises.push(fetchAndRenderGPX(seg.file, seg.color, layer.id));
          });
        }
        continue; // no lat/lng → nothing else to do for this row
      }

      // ── Normal row: has a pin location ──
      // Build a plain object from the row, keyed by lowercased header name
      var record = {};
      rows[0].forEach(function(h, idx) { record[h.trim().toLowerCase()] = (row[idx] || '').trim(); });

      var photoFilename = (photoCol !== undefined) ? (row[photoCol] || '').trim() : '';

      // Use an IIFE (Immediately Invoked Function Expression) to capture the
      // loop variables by value — without this, all async callbacks would
      // close over the SAME variable references (a classic JS loop-closure trap)
      (function(rec, la, ln, pf, gf, gc, hasAutoGpx, hasClickGpx) {
        // Look up the photo in Drive (returns null if no photo filename given)
        var p = pf ? getFileId(pf, IMAGES_FOLDER_ID, imageCache) : Promise.resolve(null);
        promises.push(p.then(function(photoId) {
          // Attach GPX metadata to the record so the click handler can use it
          rec._photoId     = photoId;
          rec._gpxFile     = gf;
          rec._gpxColor    = gc;
          rec._hasClickGpx = hasClickGpx;

          var marker = makeSheetMarker(rec, layer, la, ln, photoId, hasClickGpx, gc);
          markers[layer.id].push({ marker: marker, record: rec, layer: layer });
          count++;

          // For GPX-Auto layers, parse the cell for multiple segments and render each.
          // e.g. "day1.gpx #e05252 | day2.gpx #3daa5c" renders two coloured polylines.
          if (hasAutoGpx && gf) {
            var segs = parseGpxSegments(gf, gc);
            return Promise.all(segs.map(function(seg) {
              return fetchAndRenderGPX(seg.file, seg.color, layer.id);
            }));
          }
        }));
      })(record, lat, lng, photoFilename, gpxFilename, gpxColor,
         gpxAutoCol !== undefined, gpxClickCol !== undefined);
    }

    await Promise.allSettled(promises);
    sheetLoaded[layer.id] = true;
    var el = document.getElementById('cnt-' + layer.id); if (el) el.textContent = count || '';
    return count;
  } catch(e) {
    console.error('loadSheetLayer error:', e); return 0;
  }
}

// ═══════════════════════════════════════════════════════════
// GOOGLE DRIVE FILE LOOKUP
// Searches a Drive folder by filename to get the file ID,
// then caches the result to avoid redundant API calls.
// ═══════════════════════════════════════════════════════════

async function getFileId(filepath, folderId, cache) {
  // Strip any path prefix — we only need the bare filename
  var filename = filepath.split('/').pop();
  if (!filename) return null;
  if (cache[filename]) return cache[filename]; // return cached ID if we've seen this file before

  try {
    var q   = encodeURIComponent('name="' + filename + '" and "' + folderId + '" in parents');
    var url = 'https://www.googleapis.com/drive/v3/files?q=' + q + '&fields=files(id,name)&key=' + apiKey;
    var resp = await fetch(url);
    if (!resp.ok) return null;
    var data = await resp.json();
    if (data.files && data.files.length > 0) {
      cache[filename] = data.files[0].id; // store in cache for next time
      return data.files[0].id;
    }
  } catch(e) { console.error('File lookup error:', e); }
  return null;
}

// Build a Google Drive thumbnail URL from a file ID
function getDriveImageUrl(fileId) {
  return 'https://drive.google.com/thumbnail?id=' + fileId + '&sz=w300';
}

// ═══════════════════════════════════════════════════════════
// GPX SEGMENT PARSER
// Converts a cell value into an array of {file, color} objects.
//
// Supported cell formats (all backward-compatible):
//   Single file:            "route.gpx"
//   Single file + color:    "route.gpx #e05252"
//   Multi-segment:          "day1.gpx #e05252 | day2.gpx #3daa5c | day3.gpx"
//
// Each pipe-separated token is "filename [optional-color]".
// If no color is given for a segment, defaultColor is used.
// ═══════════════════════════════════════════════════════════

function parseGpxSegments(cellValue, defaultColor) {
  if (!cellValue) return [];
  defaultColor = defaultColor || '#e8a020';

  // Split on pipe character, trim whitespace from each token
  return cellValue.split('|').map(function(token) {
    token = token.trim();
    if (!token) return null;

    // Check for a hex color at the END of the token (after the filename)
    var colorMatch = token.match(/(#[0-9a-fA-F]{6})\s*$/);
    var color      = colorMatch ? colorMatch[1] : defaultColor;

    // Remove the color from the token to get the bare filename
    var file = token.replace(/(#[0-9a-fA-F]{6})\s*$/, '').trim();
    if (!file) return null;

    return { file: file, color: color };
  }).filter(Boolean); // drop any null entries
}

// ═══════════════════════════════════════════════════════════
// GPX FETCH AND RENDER
// Fetches a .gpx file from the GitHub Pages /routes/ folder
// and draws it as a coloured polyline on the map.
// ═══════════════════════════════════════════════════════════

async function fetchAndRenderGPX(gpxFilename, color, layerId) {
  try {
    var filename = gpxFilename.split('/').pop();
    if (!filename) { console.warn('No GPX filename provided'); return; }

    // GPX files live in the /routes/ directory of the GitHub Pages site
    var url  = 'https://jumpin721-ux.github.io/routes/' + encodeURIComponent(filename);
    var resp = await fetch(url);
    if (!resp.ok) { console.error('GPX fetch error:', resp.status, filename); return; }
    var gpxText = await resp.text();

    var pts = parseGPX(gpxText);
    if (!pts.length) { console.warn('No track points found in', gpxFilename); return; }

    var polyline = new google.maps.Polyline({
      path:         pts,
      strokeColor:  color || '#e8a020',
      strokeWeight: 4,
      strokeOpacity: 0.85,
      map:          map
    });

    // Store the polyline so we can show/hide it when the layer is toggled
    if (layerId) {
      if (!autoPolylines[layerId]) autoPolylines[layerId] = [];
      autoPolylines[layerId].push(polyline);
    }

    return polyline;
  } catch(e) { console.error('fetchAndRenderGPX error:', e); }
}

// Renders GPX route(s) in response to a marker click (Bike Rides / Bucket List layers).
// Supports multi-segment format: "day1.gpx #e05252 | day2.gpx #3daa5c"
// Clears any previously click-rendered routes first.
// clickPolyline is now an array to hold multiple segment polylines.
async function renderClickGPX(gpxCellValue, defaultColor) {
  // Clear any existing click polylines
  if (clickPolyline) {
    if (Array.isArray(clickPolyline)) {
      clickPolyline.forEach(function(p) { p.setMap(null); });
    } else {
      clickPolyline.setMap(null);
    }
    clickPolyline = null;
  }

  var segs = parseGpxSegments(gpxCellValue, defaultColor || '#e8a020');
  if (!segs.length) return;

  var polylines = [];
  await Promise.all(segs.map(async function(seg) {
    try {
      var filename = seg.file.split('/').pop();
      if (!filename) return;
      var url  = 'https://jumpin721-ux.github.io/routes/' + encodeURIComponent(filename);
      var resp = await fetch(url);
      if (!resp.ok) { console.error('renderClickGPX fetch error:', resp.status, filename); return; }
      var pts  = parseGPX(await resp.text());
      if (!pts.length) return;
      var poly = new google.maps.Polyline({
        path: pts, strokeColor: seg.color,
        strokeWeight: 4, strokeOpacity: 0.85, map: map
      });
      polylines.push(poly);
    } catch(e) { console.error('renderClickGPX error:', e); }
  }));

  clickPolyline = polylines; // store as array

  // Show the Clear Route button while click-GPX routes are active
  if (polylines.length) {
    var btn = document.getElementById('clear-route-btn');
    if (btn) btn.style.display = 'block';
  }
}

// Parse a GPX XML string and return an array of {lat, lng} objects.
// GPX files can contain three kinds of point elements:
//   trkpt — track points recorded by a GPS device while riding (most common)
//   rtept — route points in a planned route
//   wpt   — waypoints / named POIs (e.g. tunnel entrances, cafes)
// We ONLY use trkpt and rtept because they form the continuous route line.
// wpt points are scattered landmarks; connecting them produces the wrong
// result — a spider-web of straight lines between POIs instead of the route.
function parseGPX(text) {
  var xml = new DOMParser().parseFromString(text, 'text/xml');

  // Try track points first (recorded rides), fall back to route points (planned routes)
  var pts = Array.from(xml.querySelectorAll('trkpt'));
  if (!pts.length) pts = Array.from(xml.querySelectorAll('rtept'));
  // Note: wpt (waypoints) intentionally excluded — they are POIs, not route geometry

  return pts
    .map(function(p) { return { lat: parseFloat(p.getAttribute('lat')), lng: parseFloat(p.getAttribute('lon')) }; })
    .filter(function(p) { return !isNaN(p.lat) && !isNaN(p.lng); });
}

// Remove click-rendered GPX polylines (Bike Rides / Bucket List marker click).
// clickPolyline may now be an array (multi-segment routes).
// Hides the Clear Route button only if no file GPX is also active.
function clearClickGPX() {
  if (clickPolyline) {
    if (Array.isArray(clickPolyline)) {
      clickPolyline.forEach(function(p) { p.setMap(null); });
    } else {
      clickPolyline.setMap(null);
    }
    clickPolyline = null;
  }
  if (!fileGPXLine) {
    var btn = document.getElementById('clear-route-btn');
    if (btn) btn.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════════
// FIELD CONCATENATION
// Config sheet cells can specify "City+State+Zip" to combine
// multiple columns into one displayed value.
// ═══════════════════════════════════════════════════════════

function resolveField(fieldSpec, record) {
  if (!fieldSpec) return '';
  var parts  = fieldSpec.split('+');
  var values = parts.map(function(p) { return (record[p.trim().toLowerCase()] || '').trim(); }).filter(Boolean);
  if (!values.length) return '';
  if (parts.length === 3) return values[0] + ', ' + values[1] + ' ' + values[2]; // City, State Zip
  if (parts.length === 2) return values[0] + ', ' + values[1];
  return values[0];
}

// ═══════════════════════════════════════════════════════════
// MARKERS
// ═══════════════════════════════════════════════════════════

// Create a coloured circle marker for a Places API result
function makeMarker(place, layer, lat, lng) {
  var m = new google.maps.Marker({
    position: { lat: lat, lng: lng },
    map:      enabled[layer.id] ? map : null,
    title:    '',
    icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: layer.color, fillOpacity: 0.9, strokeColor: '#ffffff', strokeWeight: 1.5, scale: 8 }
  });
  m.addListener('mouseover', function(e) { showTooltip(place, layer, e, 'places'); });
  m.addListener('mouseout',  scheduleHide);
  m.addListener('click',     function() { showPopup(place, layer, 'places', lat, lng, null, m); });
  return m;
}

// Create a coloured circle marker for a Google Sheet row.
// hasClickGpx and gpxColor are used to render a route on click.
function makeSheetMarker(record, layer, lat, lng, photoId, hasClickGpx, gpxColor) {
  var m = new google.maps.Marker({
    position: { lat: lat, lng: lng },
    map:      enabled[layer.id] ? map : null,
    title:    '',
    icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: layer.color, fillOpacity: 0.9, strokeColor: '#ffffff', strokeWeight: 1.5, scale: 8 }
  });
  m.addListener('mouseover', function(e) { showTooltip(record, layer, e, 'sheet'); });
  m.addListener('mouseout',  scheduleHide);
  m.addListener('click', function() {
    showPopup(record, layer, 'sheet', lat, lng, photoId, m);
    // For click-GPX layers (Bike Rides), draw the route when the pin is clicked
    if (hasClickGpx && record._gpxFile) {
      renderClickGPX(record._gpxFile, record._gpxColor);
    }
  });
  return m;
}

// ═══════════════════════════════════════════════════════════
// TOOLTIP (hover card)
// ═══════════════════════════════════════════════════════════

function showTooltip(data, layer, event, dtype) {
  var tt   = document.getElementById('tooltip');
  var name = dtype === 'places'
    ? (data.displayName && data.displayName.text || 'Unknown')
    : resolveField(layer.hover[0] || 'name', data);
  document.getElementById('tt-name').textContent = name;

  // Build the secondary info line (rating, type, price for Places; hover fields for Sheet)
  var lines = [];
  if (dtype === 'places') {
    if (data.rating) {
      lines.push('★'.repeat(Math.round(data.rating)) + '☆'.repeat(5-Math.round(data.rating))
               + ' ' + data.rating.toFixed(1)
               + (data.userRatingCount ? ' (' + data.userRatingCount.toLocaleString() + ')' : ''));
    }
    if (data.primaryTypeDisplayName && data.primaryTypeDisplayName.text) lines.push(data.primaryTypeDisplayName.text);
    if (data.priceLevel) lines.push(priceStr(data.priceLevel));
  } else {
    // For sheet layers, hover fields 1..n are the secondary info (field 0 is the name)
    for (var i = 1; i < layer.hover.length; i++) {
      var val = resolveField(layer.hover[i], data); if (val) lines.push(val);
    }
  }
  document.getElementById('tt-meta').textContent = lines.join(' · ');

  // Build the "Open in Google Maps" link for the tooltip
  document.getElementById('tt-link').href = dtype === 'places'
    ? gmapsUrl(data)
    : (data.latitude && data.longitude ? 'https://www.google.com/maps?q=' + data.latitude + ',' + data.longitude : 'https://www.google.com/maps');

  // Position the tooltip near the cursor
  clearTimeout(_hideTimer);
  var wrap = document.getElementById('map-wrap'), rect = wrap.getBoundingClientRect();
  var x = (event.domEvent && event.domEvent.clientX || 0) - rect.left;
  var y = (event.domEvent && event.domEvent.clientY || 0) - rect.top;
  tt.style.left = (x + 8) + 'px'; tt.style.top = (y - 4) + 'px'; tt.style.display = 'block';
}

// Delay hiding the tooltip slightly so the user can move the mouse onto it
function scheduleHide() { _hideTimer = setTimeout(function() { document.getElementById('tooltip').style.display = 'none'; }, 300); }
function hideTooltip()  { clearTimeout(_hideTimer); document.getElementById('tooltip').style.display = 'none'; }

// ═══════════════════════════════════════════════════════════
// POPUP (click card)
// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
// POPUP (InfoWindow — anchored to marker with pointer tail)
// Uses google.maps.InfoWindow so the popup appears above the
// clicked marker, just like Google My Maps.
// ═══════════════════════════════════════════════════════════

function showPopup(data, layer, dtype, lat, lng, photoId, marker) {
  hideTooltip();

  // Close any previously open InfoWindow
  if (infoWindow) infoWindow.close();

  // Extract PlaceID early — used by both photo fetch and Maps URL.
  // The cell may contain a HYPERLINK formula; extract just the ChIJ... ID.
  var rawPlaceId   = (data['placeid'] || data['place_id'] || data['PlaceID'] || '').toString().trim();
  var placeIdMatch = rawPlaceId.match(/place_id:([^"&]+)/);
  var cleanPlaceId = placeIdMatch ? placeIdMatch[1] : rawPlaceId;

  // ── Build the InfoWindow HTML content ──
  var name = dtype === 'places'
    ? (data.displayName && data.displayName.text || 'Unknown')
    : resolveField('name', data);

  // Layer label badge
  var html = '<div class="iw-wrap">';
  html += '<span class="iw-tag" style="background:' + layer.color + '">' + escHtml(layer.label) + '</span>';

  // Unique IDs so we can find these elements after InfoWindow renders
  var photoId2 = 'iw-photo-' + Date.now();
  var phId2    = 'iw-ph-'    + Date.now();
  html += '<img id="' + photoId2 + '" class="iw-photo" alt="photo"/>';
  html += '<div id="' + phId2 + '" class="iw-placeholder">&#128205;</div>';

  // Name
  html += '<div class="iw-name">' + escHtml(name) + '</div>';

  // Star rating (Places API only)
  if (dtype === 'places' && data.rating) {
    var stars = '&#9733;'.repeat(Math.round(data.rating)) + '&#9734;'.repeat(5 - Math.round(data.rating));
    var rcnt  = data.userRatingCount ? ' (' + data.userRatingCount.toLocaleString() + ' reviews)' : '';
    html += '<div class="iw-rating"><span class="iw-stars">' + stars + '</span>'
          + '<span class="iw-rnum">' + data.rating.toFixed(1) + '</span>'
          + '<span class="iw-rcnt">' + rcnt + '</span></div>';
  }

  html += '<hr class="iw-divider"/>';

  var fieldIcons = { 'address':'&#128205;','city+state+zip':'&#128205;','notes':'&#128221;',
    'phone':'&#128222;','website':'&#127760;','email':'&#128231;','description':'&#128221;',
    'link':'&#128279;','miles':'&#128690;','distance':'&#128690;','length':'&#128207;',
    'year':'&#128197;','days':'&#128197;','elevation':'&#9968;','surface':'&#128740;',
    'cuisine':'&#127869;','hours':'&#128336;','state':'&#128204;','item':'&#127991;','name':'&#127991;' };

  function addField(icon, text, isLink) {
    if (!text) return;
    var safeText = isLink
      ? '<a href="' + (text.match(/^https?:\/\//) ? escHtml(text) : '#') + '" target="_blank">'
        + escHtml(text.replace(/^https?:\/\//, '').replace(/\/$/, '')) + '</a>'
      : escHtml(text);
    html += '<div class="iw-field"><div class="iw-icon">' + icon + '</div>'
          + '<div class="iw-text">' + safeText + '</div></div>';
  }

  if (dtype === 'places') {
    if (data.primaryTypeDisplayName && data.primaryTypeDisplayName.text) addField(fieldIcons['cuisine'], data.primaryTypeDisplayName.text, false);
    if (data.editorialSummary && data.editorialSummary.text)             addField(fieldIcons['notes'], data.editorialSummary.text, false);
    if (data.priceLevel)                                                  addField('&#128176;', priceStr(data.priceLevel), false);
    if (data.formattedAddress)                                            addField(fieldIcons['address'], data.formattedAddress, false);
    if (data.regularOpeningHours && data.regularOpeningHours.weekdayDescriptions) {
      var dow = new Date().getDay(), idx = dow === 0 ? 6 : dow - 1;
      var h = data.regularOpeningHours.weekdayDescriptions[idx]; if (h) addField(fieldIcons['hours'], h, false);
    }
    if (data.websiteUri)          addField(fieldIcons['website'], data.websiteUri, true);
    if (data.nationalPhoneNumber) addField(fieldIcons['phone'], data.nationalPhoneNumber, false);
  } else {
    layer.click.forEach(function(fieldSpec) {
      var key = fieldSpec.toLowerCase().replace(/\s+/g, '');
      if (key === 'photo' || key === 'name' || key === 'placeid' || key === 'place_id') return;
      var val = resolveField(fieldSpec, data);
      if (!val) return;
      var isLink = (key === 'website' || key === 'link' || key === 'email');
      var icon   = fieldIcons[fieldSpec.toLowerCase()] || fieldIcons[key] || '&#8226;';
      addField(icon, val, isLink);
    });
  }

  // Open in Google Maps button
  var mapsHref = dtype === 'places'
    ? gmapsUrl(data)
    : (cleanPlaceId
        ? 'https://www.google.com/maps/place/?q=place_id:' + cleanPlaceId
        : 'https://www.google.com/maps?q=' + lat + ',' + lng);
  html += '<a class="iw-gmaps" href="' + escHtml(mapsHref) + '" target="_blank">&#8599; Open in Google Maps</a>';
  html += '</div>'; // .iw-wrap

  // ── Create and open the InfoWindow ──
  infoWindow = new google.maps.InfoWindow({ content: html, maxWidth: 300 });

  // Load photos after InfoWindow DOM is ready
  google.maps.event.addListenerOnce(infoWindow, 'domready', function() {
    var photoEl = document.getElementById(photoId2);
    var phEl    = document.getElementById(phId2);
    if (!photoEl || !phEl) return;

    var wantsPhoto = layer.click && layer.click.some(function(f) { return f.toLowerCase() === 'photo'; });

    if (dtype === 'places' && data.photos && data.photos.length) {
      photoEl.src = 'https://places.googleapis.com/v1/' + data.photos[0].name + '/media?maxHeightPx=300&key=' + apiKey;
      photoEl.style.display = 'block'; phEl.style.display = 'none';
      photoEl.onerror = function() { photoEl.style.display = 'none'; phEl.style.display = 'flex'; };

    } else if (dtype === 'sheet' && photoId) {
      photoEl.src = getDriveImageUrl(photoId);
      photoEl.style.display = 'block'; phEl.style.display = 'none';
      photoEl.onerror = function() { photoEl.style.display = 'none'; phEl.style.display = 'flex'; };

    } else if (dtype === 'sheet' && wantsPhoto && cleanPlaceId) {
      phEl.textContent = '⏳';
      fetch('https://places.googleapis.com/v1/places/' + cleanPlaceId + '?fields=photos&key=' + apiKey)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.photos && d.photos.length) {
            photoEl.src = 'https://places.googleapis.com/v1/' + d.photos[0].name + '/media?maxHeightPx=300&key=' + apiKey;
            photoEl.style.display = 'block'; phEl.style.display = 'none';
            photoEl.onerror = function() { photoEl.style.display = 'none'; phEl.style.display = 'flex'; };
          } else { phEl.textContent = '📍'; }
        })
        .catch(function() { phEl.textContent = '📍'; });
    }
  });

  // Anchor to the clicked marker — this gives the pointer/tail
  infoWindow.open(map, marker);

  // Route stays on map when InfoWindow closes — user clears via the Clear Route button
}


function closePopup() {
  // Close the InfoWindow — route stays on map (user clears via Clear Route button)
  if (infoWindow) { infoWindow.close(); infoWindow = null; }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

// Escape HTML special characters to prevent XSS when building InfoWindow HTML strings
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Build the Google Maps URL for a Places API result.
// place_id: format opens the full Google Maps Place card (name, photos, reviews, hours).
// lat,lng format drops a generic pin with no extra information.
function gmapsUrl(p) {
  return p.id
    ? 'https://www.google.com/maps/place/?q=place_id:' + p.id
    : (p.location ? 'https://www.google.com/maps?q=' + p.location.latitude + ',' + p.location.longitude : 'https://www.google.com/maps');
}

// Convert Places API price level enum to a dollar-sign string
function priceStr(l) {
  return { PRICE_LEVEL_FREE:'Free', PRICE_LEVEL_INEXPENSIVE:'$', PRICE_LEVEL_MODERATE:'$$', PRICE_LEVEL_EXPENSIVE:'$$$', PRICE_LEVEL_VERY_EXPENSIVE:'$$$$' }[l] || '';
}

function setStatus(h) { document.getElementById('layers-status').textContent = h; }

// ═══════════════════════════════════════════════════════════
// ROUTE PLANNER (turn-by-turn driving/cycling/walking)
// Uses the Google Maps DirectionsService, which is separate
// from the Places API and works with street addresses.
// ═══════════════════════════════════════════════════════════



// Load a GPX file chosen by the user from the Layers panel GPX row.
// The route stays on the map until clearAllRoutes() is called.
function loadGPXFile(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var pts = parseGPX(ev.target.result);
    if (!pts.length) { alert('No track points found in this GPX file.'); return; }

    // Clear any existing routes
    clearAllRoutes();

    // Draw the new route and fit the map to show it fully
    fileGPXLine = new google.maps.Polyline({
      path: pts, strokeColor: '#e8a020', strokeWeight: 4, strokeOpacity: 0.85, map: map
    });
    var b = new google.maps.LatLngBounds();
    pts.forEach(function(p) { b.extend(p); });
    map.fitBounds(b);
    setStatus('GPX loaded: ' + pts.length + ' points from "' + file.name + '"');

    // Show the Clear Route button now that a route is active
    document.getElementById('clear-route-btn').style.display = 'block';

    // Update the GPX row label in the Layers panel
    var lbl = document.getElementById('gpx-layer-cnt');
    if (lbl) lbl.textContent = file.name.replace('.gpx','');

    // Reset so the same file can be reloaded if needed
    e.target.value = '';
  };
  reader.readAsText(file);
}

// Clear ALL active routes — both click-GPX (Bike Rides) and file-uploaded GPX.
// Called by the Clear Route button and when a new file is loaded.
function clearAllRoutes() {
  // Clear click-GPX (Bike Rides / Bucket List marker click) — may be array of segments
  if (clickPolyline) {
    if (Array.isArray(clickPolyline)) {
      clickPolyline.forEach(function(p) { p.setMap(null); });
    } else {
      clickPolyline.setMap(null);
    }
    clickPolyline = null;
  }
  // Clear file-uploaded GPX
  if (fileGPXLine)   { fileGPXLine.setMap(null);   fileGPXLine   = null; }
  // Hide the Clear Route button
  document.getElementById('clear-route-btn').style.display = 'none';
  // Reset GPX row label
  var lbl = document.getElementById('gpx-layer-cnt');
  if (lbl) lbl.textContent = '';
}

// ═══════════════════════════════════════════════════════════
// MAP STYLES
// Suppresses default Google Maps POI icons and transit icons
// so our own layer markers are not competing with clutter.
// ═══════════════════════════════════════════════════════════

function mapStyles() { return [
  { featureType: 'poi',         elementType: 'labels',      stylers: [{ visibility: 'off' }] },
  { featureType: 'poi.business',                            stylers: [{ visibility: 'off' }] },
  { featureType: 'transit',     elementType: 'labels.icon', stylers: [{ visibility: 'off' }] }
]; }
